<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Boonplay Login</title>

<style>
:root{
  --bg: white;
  --text:#111827;
  --muted:#9ca3af;
  --input:#e9edf2;
  --primary:#7ea6d6;
  --primary-dark:#6b97cc;
  --link:#3b82f6;
  --success:#34c759;
  --radius:8px;
  --transition:0.25s ease;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:420px;
  padding:20px;
  padding-top:40px;
}

/* Header */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:40px;
}

.icon{
  font-size:22px;
  cursor:pointer;
}

/* Title */
h1{
  font-size:34px;
  font-weight:700;
  margin-bottom:10px;
}

.subtitle{
  font-size:16px;
  margin-bottom:35px;
  color:#6b7280;
}

.subtitle span{
  color:var(--success);
  font-weight:600;
}

/* Tabs */
.tabs{
  display:flex;
  gap:25px;
  margin-bottom:20px;
  font-size:18px;
}

.tab{
  cursor:pointer;
  color:var(--muted);
  font-weight:500;
  transition:var(--transition);
}

.tab.active{
  color:var(--text);
  font-weight:600;
}

/* Inputs */
.input-group{
  margin-bottom:18px;
  position:relative;
}

input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:var(--radius);
  background:var(--input);
  font-size:16px;
  outline:none;
  transition:var(--transition);
}

input:focus{
  box-shadow:0 0 0 2px var(--primary);
  background:#fff;
}

.toggle-password{
  position:absolute;
  right:16px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:18px;
  color:var(--muted);
}

/* Links */
.forgot{
  font-size:15px;
  color:var(--link);
  margin-bottom:35px;
  display:inline-block;
  text-decoration:none;
}

/* Button */
button{
  width:100%;
  padding:18px;
  border:none;
  border-radius:var(--radius);
  background:var(--primary);
  color:white;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
  transition:var(--transition);
}

button:hover{
  background:var(--primary-dark);
}

button:active{
  transform:scale(0.98);
}

/* Register */
.register{
  text-align:center;
  margin-top:25px;
  font-size:16px;
}

.register a{
  color:var(--link);
  text-decoration:none;
}

/* Smooth fade */
.fade{
  animation:fadeIn .3s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container fade">

  <div class="topbar">
    <div class="icon">&#8592;</div>
    <div class="icon">&#127911;</div>
  </div>

  <h1>Log In</h1>
  <div class="subtitle">
    Fill in the details to sign up for BoonPlay
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('email')">Email</div>
    <div class="tab" onclick="switchTab('phone')">Phone</div>
  </div>

  <div class="input-group">
    <input type="text" id="username" placeholder="Enter Email">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Enter Password">
    <span class="toggle-password" onclick="togglePassword()">👁</span>
  </div>

  <a href="#" class="forgot">Forgot Password</a>

  <button onclick="login()">Log In</button>

  <div class="register">
    <a href="#">Register a new account</a>
  </div>

</div>

<script>
function switchTab(type){
  const tabs = document.querySelectorAll(".tab");
  tabs.forEach(tab => tab.classList.remove("active"));

  if(type === "email"){
    tabs[0].classList.add("active");
    document.getElementById("username").placeholder = "Enter Email";
  }else{
    tabs[1].classList.add("active");
    document.getElementById("username").placeholder = "Enter Phone";
  }
}

function togglePassword(){
  const password = document.getElementById("password");
  if(password.type === "password"){
    password.type = "text";
  }else{
    password.type = "password";
  }
}

function login(){
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if(user === "" || pass === ""){
    alert("Please fill all fields");
  }else{
    alert("Login submitted");
  }
}
</script>

</body>
                                              </html>
